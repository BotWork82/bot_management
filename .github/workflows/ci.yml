name: CI/CD Pipeline

on:
  push:
    branches:
      - main
      - master


jobs:
  lint-and-build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: package-lock.json

      - name: Install
        run: npm ci

      # - name: Lint
      #   run: npm run lint --if-present

      # - name: Test
      #   run: npm test --if-present

      - name: Build
        run: npm run build

  build-image:
    runs-on: ubuntu-latest
    needs: lint-and-build
    env:
      IMAGE_TAG: ${{ github.sha }}
    permissions:
      contents: read
      packages: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set lowercase owner name
        run: echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GHCR_TOKEN }}

      - name: Build and push image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ env.OWNER_LC }}/bot-management-frontend:${{ env.IMAGE_TAG }}
            ghcr.io/${{ env.OWNER_LC }}/bot-management-frontend:latest

  deploy:
    runs-on: ubuntu-latest
    needs: build-image
    env:
      IMAGE_TAG: ${{ github.sha }}
    steps:
      - name: Set lowercase owner name
        run: echo "OWNER_LC=${OWNER,,}" >> ${GITHUB_ENV}
        env:
          OWNER: '${{ github.repository_owner }}'

      - name: Setup SSH
        run: |
          mkdir -p ~/.ssh
          echo "${{ secrets.SSH_PRIVATE_KEY }}" > ~/.ssh/id_rsa
          chmod 600 ~/.ssh/id_rsa
          ssh-keyscan -H ${{ secrets.SERVER_IP }} >> ~/.ssh/known_hosts

      - name: Deploy image on server
        run: |
          ssh -o StrictHostKeyChecking=no -o LogLevel=ERROR -i ~/.ssh/id_rsa dave@${{ secrets.SERVER_IP }} << 'EOF'
            sudo docker login ghcr.io -u ${{ github.actor }} -p ${{ secrets.GHCR_TOKEN }}
            sudo docker pull ghcr.io/${{ env.OWNER_LC }}/bot-management-frontend:${{ env.IMAGE_TAG }}
            sudo docker stop bot-management-frontend || true
            sudo docker rm bot-management-frontend || true
            sudo docker run -d \
              --name bot-management-frontend \
              --restart unless-stopped \
              -p 3588:3588 \
              ghcr.io/${{ env.OWNER_LC }}/bot-management-frontend:${{ env.IMAGE_TAG }}
            sudo docker image prune -f
          EOF

      - name: Cleanup
        if: always()
        run: rm -rf ~/.ssh